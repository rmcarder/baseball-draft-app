<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantasy Baseball Draft Board</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #06090F;
  --s0:       #0B1120;
  --s1:       #0F1729;
  --s2:       #141F35;
  --s3:       #1A2840;
  --bd:       #1E2F4A;
  --bd2:      #263855;
  --tx:       #DCE8F5;
  --tx2:      #6B82A0;
  --tx3:      #344E6A;
  --acc:      #00C8FF;
  --acc-bg:   rgba(0,200,255,0.08);
  --acc-bg2:  rgba(0,200,255,0.14);

  --C:   #F59E0B;
  --1B:  #F87171;
  --2B:  #FB923C;
  --3B:  #FBBF24;
  --SS:  #34D399;
  --OF:  #22D3EE;
  --SP:  #60A5FA;
  --RP:  #C084FC;
  --UTIL:#A3E635;

  --t1: #F59E0B;
  --t2: #60A5FA;
  --t3: #34D399;
  --t4: #A78BFA;
  --t5: #475569;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--tx);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  overflow: hidden;
}

/* ── Layout shell ── */
.app {
  display: grid;
  grid-template-rows: 48px auto auto 1fr;
  height: 100vh;
  overflow: hidden;
}

/* ── Header ── */
.hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: var(--s0);
  border-bottom: 1px solid var(--bd);
  flex-shrink: 0;
}

.hdr-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 19px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--tx);
}
.hdr-title em { color: var(--acc); font-style: normal; }

.hdr-meta {
  display: flex;
  gap: 28px;
  align-items: center;
}

.hdr-stat { text-align: right; }
.hdr-stat-lbl {
  font-size: 8px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--tx3);
  font-family: 'Barlow Condensed', sans-serif;
}
.hdr-stat-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  color: var(--acc);
  line-height: 1;
}

/* ── Scatter row ── */
.scatter-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  background: var(--bd);
  gap: 1px;
  border-bottom: 1px solid var(--bd);
  flex-shrink: 0;
}

.scatter-panel {
  background: var(--s0);
  padding: 10px 14px 8px;
}

.scatter-lbl {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--tx);
  margin-bottom: 4px;
}

.scatter-svg { display: block; width: 100%; }

.scatter-legend {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 6px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--tx);
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.06em;
  font-weight: 600;
}
.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

/* ── Controls ── */
.controls {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 14px;
  background: var(--s1);
  border-bottom: 1px solid var(--bd);
  flex-wrap: wrap;
  flex-shrink: 0;
}

.ctrl-lbl {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--tx3);
  font-family: 'Barlow Condensed', sans-serif;
}

.pills { display: flex; gap: 3px; flex-wrap: wrap; }

.pill {
  padding: 4px 12px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 700;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.06em;
  cursor: pointer;
  border: 1px solid var(--bd2);
  background: var(--s2);
  color: var(--tx2);
  transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  user-select: none;
}
.pill:hover { color: var(--tx); border-color: var(--bd2); }
.pill.active { color: var(--bg); border-color: transparent; }
.pill[data-pos="ALL"].active  { background: var(--acc); }
.pill[data-pos="C"].active    { background: var(--C); }
.pill[data-pos="1B"].active   { background: var(--1B); }
.pill[data-pos="2B"].active   { background: var(--2B); }
.pill[data-pos="3B"].active   { background: var(--3B); }
.pill[data-pos="SS"].active   { background: var(--SS); }
.pill[data-pos="OF"].active   { background: var(--OF); }
.pill[data-pos="SP"].active   { background: var(--SP); }
.pill[data-pos="RP"].active   { background: var(--RP); }
.pill[data-pos="UTIL"].active { background: var(--UTIL); }

.sep { width: 1px; height: 22px; background: var(--bd); flex-shrink: 0; }

.drafted-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  font-size: 12px;
  color: var(--tx2);
  user-select: none;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.04em;
}
.tog-box {
  width: 15px; height: 15px;
  border: 1px solid var(--bd2);
  border-radius: 3px;
  background: var(--s2);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: transparent;
  transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
}
.tog-box.on { background: var(--acc); border-color: var(--acc); color: var(--bg); }

.ctrl-right {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--tx2);
}
.ctrl-right b { color: var(--acc); font-weight: 500; }

/* ── Table ── */
.tbl-wrap {
  overflow: auto;
  background: var(--s0);
  min-height: 0;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
  table-layout: fixed;
}

thead {
  position: sticky;
  top: 0;
  z-index: 20;
  background: var(--s2);
}

th {
  padding: 7px 8px;
  text-align: right;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--tx2);
  border-bottom: 1px solid var(--bd);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  transition: color 0.28s cubic-bezier(0.4, 0, 0.2, 1);
}
th:hover { color: var(--tx); }
th.sa   { color: var(--acc); }
th.lft  { text-align: left; }
.si { display: inline-block; margin-left: 2px; opacity: 0.35; font-size: 8px; }
th.sa .si { opacity: 1; }

/* Sticky cols */
th:nth-child(1), td:nth-child(1) { position: sticky; left: 0;    z-index: 5; width: 36px;  text-align: center; }
th:nth-child(2), td:nth-child(2) { position: sticky; left: 36px; z-index: 5; width: 36px;  text-align: center; }
th:nth-child(3), td:nth-child(3) { position: sticky; left: 72px; z-index: 5; width: 190px; text-align: left;   }
th:nth-child(4), td:nth-child(4) { position: sticky; left: 262px;z-index: 5; width: 52px;  text-align: left;   }

thead th:nth-child(1),
thead th:nth-child(2),
thead th:nth-child(3),
thead th:nth-child(4) { background: var(--s2); }

tbody tr td:nth-child(1),
tbody tr td:nth-child(2),
tbody tr td:nth-child(3),
tbody tr td:nth-child(4) { background: inherit; }

tbody tr { background: var(--s0); border-bottom: 1px solid var(--bd); transition: background 0.22s cubic-bezier(0.4, 0, 0.2, 1); }
tbody tr:nth-child(even) { background: var(--s1); }
tbody tr:hover, tbody tr.hl { background: var(--acc-bg2) !important; }
tbody tr.drafted { opacity: 0.3; }

td {
  padding: 5px 8px;
  text-align: right;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--tx);
}
td.rank { text-align: center; color: var(--tx3); font-size: 10px; }
td.pcell { font-family: 'DM Sans', sans-serif; padding: 3px 8px; }
.pname { font-size: 12px; font-weight: 500; color: var(--tx); line-height: 1.3; }
.pteam { font-size: 9px; color: var(--tx2); font-weight: 300; }

/* Position pill */
.pp {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 99px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: #06090F;
  letter-spacing: 0.04em;
}
.pp-C   { background: var(--C);  }
.pp-1B  { background: var(--1B); }
.pp-2B  { background: var(--2B); }
.pp-3B  { background: var(--3B); }
.pp-SS  { background: var(--SS); }
.pp-OF  { background: var(--OF); }
.pp-SP  { background: var(--SP); }
.pp-RP   { background: var(--RP); }
.pp-UTIL { background: var(--UTIL); }

/* Tier badge */
.tb {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px; height: 18px;
  border-radius: 3px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: #06090F;
}
.tb1 { background: var(--t1); }
.tb2 { background: var(--t2); }
.tb3 { background: var(--t3); }
.tb4 { background: var(--t4); }
.tb5,.tb6,.tb7,.tb8,.tb9,.tb10 { background: var(--s3); color: var(--tx2); }

.pos-num { color: #34D399; }
.neg-num { color: #F87171; }
.dim-num { color: var(--tx3); }

/* Draft button */
.dbtn {
  padding: 2px 9px;
  border-radius: 3px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  border: 1px solid var(--bd2);
  background: transparent;
  color: var(--tx2);
  transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  white-space: nowrap;
}
.dbtn:hover { background: var(--acc); border-color: var(--acc); color: var(--bg); }
.dbtn.undraft { color: var(--tx3); border-color: var(--bd); }
.dbtn.undraft:hover { background: #F87171; border-color: #F87171; color: var(--bg); }

/* Tooltip */
.tip {
  position: fixed;
  background: var(--s2);
  border: 1px solid var(--bd2);
  border-radius: 5px;
  padding: 8px 12px;
  font-size: 11px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 9999;
  min-width: 160px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.tip.show { opacity: 1; }
.tip-name { font-weight: 500; color: var(--tx); font-size: 12px; margin-bottom: 6px; }
.tip-team { color: var(--tx2); font-weight: 300; font-size: 10px; }
.tip-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
}
.tip-k { color: var(--tx2); }
.tip-v { color: var(--acc); }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--s0); }
::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--tx3); }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="hdr">
    <div class="hdr-title">Fantasy Baseball &nbsp;<em>Draft Board</em></div>
    <div class="hdr-meta">
      <div class="hdr-stat">
        <div class="hdr-stat-lbl">Available</div>
        <div class="hdr-stat-val" id="s-avail">—</div>
      </div>
      <div class="hdr-stat">
        <div class="hdr-stat-lbl">Drafted</div>
        <div class="hdr-stat-val" id="s-drafted">0</div>
      </div>
      <div class="hdr-stat">
        <div class="hdr-stat-lbl">Round</div>
        <div class="hdr-stat-val" id="s-round">1</div>
      </div>
    </div>
  </header>

  <!-- Scatter plots -->
  <div class="scatter-row">
    <div class="scatter-panel">
      <div class="scatter-lbl" id="lbl-f">All Players — Total SGP vs Value Above Replacement</div>
      <svg id="sv-f" class="scatter-svg"></svg>
      <div class="scatter-legend" id="leg-f"></div>
    </div>
    <div class="scatter-panel">
      <div class="scatter-lbl">Hitters — Total SGP vs Value Above Replacement</div>
      <svg id="sv-h" class="scatter-svg"></svg>
      <div class="scatter-legend" id="leg-h"></div>
    </div>
    <div class="scatter-panel">
      <div class="scatter-lbl">Pitchers — Total SGP vs Value Above Replacement</div>
      <svg id="sv-p" class="scatter-svg"></svg>
      <div class="scatter-legend" id="leg-p"></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <span class="ctrl-lbl">Position</span>
    <div class="pills" id="pos-pills">
      <button class="pill active" data-pos="ALL">ALL</button>
      <button class="pill" data-pos="C">C</button>
      <button class="pill" data-pos="1B">1B</button>
      <button class="pill" data-pos="2B">2B</button>
      <button class="pill" data-pos="3B">3B</button>
      <button class="pill" data-pos="SS">SS</button>
      <button class="pill" data-pos="OF">OF</button>
      <button class="pill" data-pos="SP">SP</button>
      <button class="pill" data-pos="RP">RP</button>
      <button class="pill" data-pos="UTIL">UTIL</button>
    </div>
    <div class="sep"></div>
    <div class="drafted-toggle" id="tog-wrap">
      <div class="tog-box" id="tog">✓</div>
      <span>Show drafted</span>
    </div>
    <div class="sep"></div>
    <div class="drafted-toggle" id="stat-tog-wrap">
      <div class="tog-box" id="stat-tog">✓</div>
      <span>Raw stats</span>
    </div>
    <input id="search" type="text" placeholder="Search player…" style="
      background: var(--s2); border: 1px solid var(--bd2); border-radius: 99px;
      color: var(--tx); font-family: 'DM Sans', sans-serif; font-size: 12px;
      padding: 4px 14px; outline: none; width: 240px;
    " />
    <div class="ctrl-right">
      <b id="c-drafted">0</b> drafted &nbsp;·&nbsp; <b id="c-avail">—</b> available
    </div>
  </div>

  <!-- Table -->
  <div class="tbl-wrap">
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<!-- Tooltip -->
<div class="tip" id="tip">
  <div class="tip-name" id="tip-name"></div>
  <div class="tip-grid" id="tip-grid"></div>
</div>

async function boot() {
  ALL = Array.isArray(PLAYER_DATA) ? PLAYER_DATA : Object.values(PLAYER_DATA);
  ALL.forEach(d => {
    NUM_COLS.forEach(c => d[c] = +d[c] || 0);
    d._id = d.Player;
  });
  // Compute SGP rank (sorted by Total_SGP desc)
  [...ALL].sort((a,b) => b.Total_SGP - a.Total_SGP)
    .forEach((d,i) => d.SGP_Rank = i + 1);
  render(); setupControls();
}

function parseName(s) {
  const m = s.match(/^(.+?)\s*\(([A-Z]+)\s*[-–]/);
  return m ? { name: m[1].trim(), team: m[2] } : { name: s, team: '' };
}

function visible() {
  return ALL
    .filter(d => (showDrafted || !drafted.has(d._id)) && (posFil.size === 0 || posFil.has(d.POS)) && (!searchQ || d.Player.toLowerCase().includes(searchQ)))
    .sort((a,b) => {
      const dir = sortDir === 'desc' ? -1 : 1;
      const av = a[sortCol], bv = b[sortCol];
      return typeof av === 'number' ? dir*(av-bv) : dir*String(av).localeCompare(String(bv));
    });
}

function renderHeader() {
  const cols = showRawStats ? COL_DEFS.raw : COL_DEFS.sgp;
  const tr = document.createElement('tr');
  [
    { html: 'SGP# <span class="si">↕</span>', cls: '', col: 'SGP_Rank' },
    { html: 'VAR# <span class="si">↕</span>', cls: '', col: 'OverallRank' },
    { html: 'Player <span class="si">↕</span>', cls: 'lft', col: 'Player' },
    { html: 'Pos <span class="si">↕</span>',   cls: 'lft', col: 'POS'   },
    { html: 'Tier <span class="si">↕</span>',  cls: '',    col: 'Tier'  },
  ].forEach(({html, cls, col}) => {
    const th = document.createElement('th');
    th.innerHTML = html;
    if (cls) th.className = cls;
    if (col) {
      th.dataset.col = col;
      if (col === sortCol) {
        th.classList.add('sa');
        th.querySelector('.si').textContent = sortDir === 'desc' ? '↓' : '↑';
      }
    }
    tr.appendChild(th);
  });
  cols.forEach(({col, lbl}) => {
    const th = document.createElement('th');
    const sorted = sortCol === col;
    if (sorted) th.classList.add('sa');
    th.dataset.col = col;
    th.innerHTML = `${lbl} <span class="si">${sorted ? (sortDir==='desc'?'↓':'↑') : '↕'}</span>`;
    tr.appendChild(th);
  });
  const thEnd = document.createElement('th');
  thEnd.style.width = '70px';
  tr.appendChild(thEnd);
  const thead = document.getElementById('thead');
  thead.innerHTML = '';
  thead.appendChild(tr);
}

function render() {
  updateStats(); renderScatters(); renderTable();
}

function updateStats() {
  const avail = ALL.length - drafted.size;
  document.getElementById('s-avail').textContent = avail;
  document.getElementById('s-drafted').textContent = drafted.size;
  document.getElementById('s-round').textContent = Math.floor(drafted.size/10)+1;
  document.getElementById('c-drafted').textContent = drafted.size;
  document.getElementById('c-avail').textContent = avail;
}

// ── Scatters ─────────────────────────────────────────────────────────────────
const SM = { t:10, r:16, b:34, l:40 };

function renderScatters() {
  const ALL_POS = ['C','1B','2B','3B','SS','OF','UTIL','SP','RP'];
  const fPos = posFil.size === 0 ? ALL_POS : [...posFil];
  const fLbl = posFil.size === 0 ? 'All Players' : [...posFil].join(', ');
  document.getElementById('lbl-f').textContent = fLbl + ' — Total SGP vs Value Above Replacement';
  drawScatter('sv-f','leg-f', fPos);
  drawScatter('sv-h','leg-h', HPOS);
  drawScatter('sv-p','leg-p', PPOS);
}

function drawScatter(svgId, legId, positions) {
  const panel = document.getElementById(svgId).parentElement;
  const W = panel.clientWidth - 28, H = 280;
  const pw = W - SM.l - SM.r, ph = H - SM.t - SM.b;
  const DUR = 700;
  const T = d3.transition().duration(DUR).ease(d3.easeSinInOut);

  const svg = d3.select('#'+svgId).attr('width', W).attr('height', H);

  // ── One-time structure init ──────────────────────────────────────────────
  let g = svg.select('g.sc-root');
  if (g.empty()) {
    g = svg.append('g').attr('class','sc-root').attr('transform',`translate(${SM.l},${SM.t})`);
    g.append('g').attr('class','sc-gx');
    g.append('g').attr('class','sc-gy');
    g.append('g').attr('class','sc-ax').attr('transform',`translate(0,${ph})`);
    g.append('g').attr('class','sc-ay');
    g.append('text').attr('class','sc-lx')
      .attr('x',pw/2).attr('y',ph+28).attr('text-anchor','middle')
      .attr('fill','#DCE8F5').attr('font-size',9)
      .attr('font-family','Barlow Condensed,sans-serif').attr('letter-spacing','0.1em')
      .text('TOTAL SGP');
    g.append('text').attr('class','sc-ly')
      .attr('transform','rotate(-90)').attr('x',-ph/2).attr('y',-30)
      .attr('text-anchor','middle').attr('fill','#DCE8F5').attr('font-size',9)
      .attr('font-family','Barlow Condensed,sans-serif').attr('letter-spacing','0.1em')
      .text('VAR');
    g.append('g').attr('class','sc-gone');
    g.append('g').attr('class','sc-avail');
  }

  // ── Data ────────────────────────────────────────────────────────────────
  const data  = ALL.filter(d => positions.includes(d.POS));
  const avail = data.filter(d => !drafted.has(d._id));
  const gone  = data.filter(d =>  drafted.has(d._id));

  const extData = showDrafted ? data : (avail.length ? avail : data);
  const xe = d3.extent(extData, d=>d.Total_SGP), ye = d3.extent(extData, d=>d.VAR);
  const xp = ((xe[1]-xe[0])*0.05)||1, yp = ((ye[1]-ye[0])*0.05)||1;
  const xs = d3.scaleLinear().domain([xe[0]-xp, xe[1]+xp]).range([0, pw]);
  const ys = d3.scaleLinear().domain([ye[0]-yp, ye[1]+yp]).range([ph, 0]);

  const styleAx = sel => {
    sel.select('.domain').attr('stroke','#2A3E58');
    sel.selectAll('text').attr('fill','#DCE8F5').attr('font-size',9).attr('font-family','JetBrains Mono,monospace');
    sel.selectAll('.tick line').attr('stroke','#2A3E58');
  };

  // ── Axes (animated) ──────────────────────────────────────────────────────
  g.select('.sc-ax').transition(T).call(d3.axisBottom(xs).ticks(5).tickSize(3)).call(styleAx);
  g.select('.sc-ay').transition(T).call(d3.axisLeft(ys).ticks(5).tickSize(3)).call(styleAx);

  // ── Gridlines ────────────────────────────────────────────────────────────
  g.select('.sc-gx').selectAll('line').data(xs.ticks(5), d=>d)
    .join(
      en => en.append('line')
        .attr('x1',d=>xs(d)).attr('x2',d=>xs(d)).attr('y1',0).attr('y2',ph)
        .attr('stroke','#1A2840').attr('stroke-width',1).attr('opacity',0)
        .call(e=>e.transition(T).attr('opacity',1)),
      up => up.transition(T).attr('x1',d=>xs(d)).attr('x2',d=>xs(d)),
      ex => ex.transition(T).attr('opacity',0).remove()
    );
  g.select('.sc-gy').selectAll('line').data(ys.ticks(5), d=>d)
    .join(
      en => en.append('line')
        .attr('x1',0).attr('x2',pw).attr('y1',d=>ys(d)).attr('y2',d=>ys(d))
        .attr('stroke','#1A2840').attr('stroke-width',1).attr('opacity',0)
        .call(e=>e.transition(T).attr('opacity',1)),
      up => up.transition(T).attr('y1',d=>ys(d)).attr('y2',d=>ys(d)),
      ex => ex.transition(T).attr('opacity',0).remove()
    );

  // ── Drafted ghost rings ──────────────────────────────────────────────────
  g.select('.sc-gone').selectAll('circle').data(showDrafted ? gone : [], d=>d._id)
    .join(
      en => en.append('circle')
        .attr('cx',d=>xs(d.Total_SGP)).attr('cy',d=>ys(d.VAR))
        .attr('r',0).attr('fill','none')
        .attr('stroke',d=>POS_COLORS[d.POS]||'#344E6A')
        .attr('stroke-width',1).attr('opacity',0)
        .call(e=>e.transition(T).attr('r',3.5).attr('opacity',0.25)),
      up => up.transition(T)
        .attr('cx',d=>xs(d.Total_SGP)).attr('cy',d=>ys(d.VAR))
        .attr('r',3.5).attr('opacity',0.25),
      ex => ex.transition(T).attr('r',0).attr('opacity',0).remove()
    );

  // ── Available dots ───────────────────────────────────────────────────────
  const tip = document.getElementById('tip');
  const availSel = g.select('.sc-avail').selectAll('circle').data(avail, d=>d._id);

  // Exit: shrink + fade out
  availSel.exit().transition(T)
    .attr('r',0).attr('fill-opacity',0).attr('stroke-opacity',0).remove();

  // Enter: spawn at position, animate in
  const entering = availSel.enter().append('circle')
    .attr('class', d=>'dot-'+safeId(d._id))
    .attr('cx', d=>xs(d.Total_SGP)).attr('cy', d=>ys(d.VAR))
    .attr('r', 0)
    .attr('fill', d=>POS_COLORS[d.POS]||'#344E6A')
    .attr('fill-opacity', 0)
    .attr('stroke', d=>POS_COLORS[d.POS]||'#344E6A')
    .attr('stroke-width', 1).attr('stroke-opacity', 0)
    .style('cursor','pointer')
    .on('mouseover', function(event, d) {
      hovered = d._id;
      d3.select(this).attr('r',9).attr('fill-opacity',1).attr('stroke-width',2.5);
      hlRow(d._id);
      const p = parseName(d.Player);
      document.getElementById('tip-name').innerHTML =
        `${p.name} <span class="tip-team">${p.team}</span>`;
      document.getElementById('tip-grid').innerHTML = `
        <span class="tip-k">SGP</span><span class="tip-v">${d.Total_SGP.toFixed(2)}</span>
        <span class="tip-k">VAR</span><span class="tip-v">${d.VAR.toFixed(2)}</span>
        <span class="tip-k">Tier</span><span class="tip-v">${d.Tier}</span>
        <span class="tip-k">Rank</span><span class="tip-v">#${d.OverallRank}</span>
      `;
      tip.classList.add('show');
    })
    .on('mousemove', event => {
      tip.style.left = (event.clientX+14)+'px';
      tip.style.top  = (event.clientY-8)+'px';
    })
    .on('mouseout', function() {
      hovered = null;
      d3.select(this).attr('r',5).attr('fill-opacity',0.72).attr('stroke-width',1);
      clearHlRow(); tip.classList.remove('show');
    });

  entering.transition(T).attr('r',5).attr('fill-opacity',0.72).attr('stroke-opacity',0.9);

  // Update: animate to new axis positions (on filter/draft change)
  availSel.transition(T)
    .attr('cx', d=>xs(d.Total_SGP)).attr('cy', d=>ys(d.VAR));

  // ── Legend ───────────────────────────────────────────────────────────────
  document.getElementById(legId).innerHTML =
    positions.map(p=>`<div class="legend-item">
      <div class="legend-dot" style="background:${POS_COLORS[p]}"></div>${p}
    </div>`).join('');
}

// ── Table ────────────────────────────────────────────────────────────────────
function renderTable() {
  renderHeader();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  const data = visible();

  data.forEach(d => {
    const p   = parseName(d.Player);
    const gone = drafted.has(d._id);
    const tr = document.createElement('tr');
    if (gone) tr.classList.add('drafted');
    tr.dataset.id = d._id;

    const statCells = (showRawStats ? COL_DEFS.raw : COL_DEFS.sgp)
      .map(({col, fmt}) => `<td>${fmt(d[col])}</td>`).join('');

    tr.innerHTML = `
      <td class="rank">${d.SGP_Rank}</td>
      <td class="rank">${d.OverallRank}</td>
      <td class="pcell">
        <div class="pname">${p.name}</div>
        <div class="pteam">${p.team}</div>
      </td>
      <td><span class="pp pp-${d.POS}">${d.POS}</span></td>
      <td><span class="tb tb${Math.min(+d.Tier||5,10)}">${d.Tier}</span></td>
      ${statCells}
      <td><button class="dbtn ${gone?'undraft':''}" data-id="${esc(d._id)}">${gone?'Undraft':'Draft'}</button></td>
    `;

    if (!gone) {
      tr.addEventListener('mouseenter', () => { hovered=d._id; hlDot(d._id); });
      tr.addEventListener('mouseleave', () => { hovered=null; clearHlDot(); });
    }

    tbody.appendChild(tr);
  });

  // Draft buttons
  tbody.querySelectorAll('.dbtn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.id;
      drafted.has(id) ? drafted.delete(id) : drafted.add(id);
      render();
    });
  });
}

// ── Highlight helpers ────────────────────────────────────────────────────────
function hlRow(id) {
  document.querySelectorAll('#tbody tr').forEach(tr => {
    const on = tr.dataset.id === id;
    tr.classList.toggle('hl', on);
  });
}
function clearHlRow() {
  document.querySelectorAll('#tbody tr.hl').forEach(tr => tr.classList.remove('hl'));
}
function hlDot(id) {
  d3.selectAll('.dot-'+safeId(id)).attr('r',9).attr('fill-opacity',1).attr('stroke-width',2.5);
}
function clearHlDot() {
  d3.selectAll('[class^="dot-"]').attr('r',5).attr('fill-opacity',0.72).attr('stroke-width',1);
}

// ── Controls ─────────────────────────────────────────────────────────────────
function updatePillStates() {
  document.querySelectorAll('.pill').forEach(p => {
    const pos = p.dataset.pos;
    p.classList.toggle('active', pos === 'ALL' ? posFil.size === 0 : posFil.has(pos));
  });
}

function setupControls() {
  document.getElementById('pos-pills').addEventListener('click', e => {
    const pill = e.target.closest('.pill');
    if (!pill) return;
    const pos = pill.dataset.pos;
    const multi = e.ctrlKey || e.metaKey;
    if (pos === 'ALL' || !multi) {
      posFil = pos === 'ALL' ? new Set() : new Set([pos]);
    } else {
      if (posFil.has(pos)) posFil.delete(pos); else posFil.add(pos);
    }
    updatePillStates();
    renderScatters();
    renderTable();
  });

  document.getElementById('tog-wrap').addEventListener('click', () => {
    showDrafted = !showDrafted;
    document.getElementById('tog').classList.toggle('on', showDrafted);
    render();
  });

  document.querySelector('table').addEventListener('click', e => {
    const th = e.target.closest('th[data-col]');
    if (!th) return;
    const col = th.dataset.col;
    sortDir = sortCol === col && sortDir === 'desc' ? 'asc' : 'desc';
    sortCol = col;
    renderTable();
  });

  document.getElementById('search').addEventListener('input', e => {
    searchQ = e.target.value.toLowerCase().trim();
    renderTable();
  });

  document.getElementById('stat-tog-wrap').addEventListener('click', () => {
    showRawStats = !showRawStats;
    document.getElementById('stat-tog').classList.toggle('on', showRawStats);
    const activeCols = showRawStats ? COL_DEFS.raw : COL_DEFS.sgp;
    const fixedCols  = ['Player','POS','Tier','OverallRank'];
    if (!activeCols.some(c => c.col === sortCol) && !fixedCols.includes(sortCol)) {
      sortCol = 'VAR'; sortDir = 'desc';
    }
    renderTable();
  });
}

// ── Format helpers ───────────────────────────────────────────────────────────
function fN(v) { return (+v).toFixed(2); }
function fRaw(v) {
  const n = +v;
  if (isNaN(n) || n === 0) return '<span class="dim-num">—</span>';
  return Math.round(n);
}
function fRatStat(v, dp) {
  const n = +v;
  if (isNaN(n) || n === 0) return '<span class="dim-num">—</span>';
  return n.toFixed(dp).replace(/^0\./, '.');
}
function fV(v) {
  const n = +v;
  if (isNaN(n)) return '<span class="dim-num">—</span>';
  const cls = n >= 0 ? 'pos-num' : 'neg-num';
  return `<span class="${cls}">${n.toFixed(2)}</span>`;
}
function fS(v) {
  const n = +v;
  if (!n || Math.abs(n) < 0.005) return '<span class="dim-num">—</span>';
  return n.toFixed(2);
}
function safeId(s) { return s.replace(/[^a-zA-Z0-9]/g,'_'); }
function esc(s) { return s.replace(/"/g,'&quot;'); }
